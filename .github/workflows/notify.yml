name: Yandex Market Notify

on:
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: market-notify
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run monitor
        env:
          YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
          YANDEX_CAMPAIGN_ID: ${{ secrets.YANDEX_CAMPAIGN_ID }}
          YANDEX_BUSINESS_ID: ${{ secrets.YANDEX_BUSINESS_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_SECRET: ${{ secrets.STATE_SECRET }}
        run: node monitor.js

      - name: Run Ozon monitor
        continue-on-error: true
        env:
          OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
          OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
          TELEGRAM_OZON_BOT_TOKEN: ${{ secrets.TELEGRAM_OZON_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE_SECRET: ${{ secrets.STATE_SECRET }}
        run: node ozon-monitor.js

      - name: Commit updated state
        run: |
          git config user.name "market-notify-bot"
          git config user.email "actions@github.com"
          git add state.json ozon-state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
